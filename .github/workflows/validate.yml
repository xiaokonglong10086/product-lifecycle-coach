name: Validate Skill

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Compile scripts
        run: python -m compileall product-lifecycle-coach/scripts
      - name: Run regression checks
        run: python product-lifecycle-coach/scripts/self_test.py
      - name: Build installable archive
        run: |
          find product-lifecycle-coach -type d -name __pycache__ -prune -exec rm -rf {} +
          find product-lifecycle-coach -type f -name '*.pyc' -delete
          rm -f dist/skill.zip
          zip -qr dist/skill.zip product-lifecycle-coach
